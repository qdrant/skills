name: validate skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'commands/**'
      - 'scripts/validate_skills.py'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: run skill linter
        run: python3 scripts/validate_skills.py
