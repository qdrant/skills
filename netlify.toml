[build]
  command = "bash build.sh"
  publish = "public"

[[redirects]]
  from = "/"
  to = "/index.md"
  status = 200

[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Access-Control-Allow-Origin = "*"
